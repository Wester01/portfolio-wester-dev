<section id="stack" class="py-20 md:py-28">
  <div class="mx-auto max-w-6xl px-5 sm:px-6 lg:px-8">
    <app-titulo-seccion
      etiqueta="Stack"
      titulo="Tecnologías con criterio"
      descripcion="Herramientas agrupadas por uso real: frontend, backend, automatización, tooling y seguridad."
    />

    <div class="grid gap-5 lg:grid-cols-3">
      @for (grupo of gruposTecnologia; track grupo.id) {
        <article class="rounded-2xl border border-white/10 bg-white/[0.03] p-6">
          <h3 class="text-xl font-semibold text-white">
            {{ grupo.titulo }}
          </h3>

          <p class="mt-3 text-sm leading-6 text-[#A7B0C0]">
            {{ grupo.descripcion }}
          </p>

          <div class="mt-5 flex flex-wrap gap-2">
            @for (tecnologia of grupo.tecnologias; track tecnologia) {
              <app-chip-tecnologia [texto]="tecnologia" />
            }
          </div>
        </article>
      }
    </div>
  </div>
</section>
