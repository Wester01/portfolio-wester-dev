<footer class="border-t border-white/10 py-8">
  <div
    class="mx-auto flex max-w-6xl flex-col gap-5 px-5 text-sm text-[#6E7688] sm:px-6 md:flex-row md:items-center md:justify-between lg:px-8"
  >
    <div>
      <p class="font-medium text-[#A7B0C0]">
        Wester Dev · Guillermo Romero
      </p>
      <p class="mt-2 text-xs uppercase tracking-[0.16em]">
        Construido con Angular · TypeScript · Tailwind CSS · Vercel
      </p>
    </div>

    <div class="flex flex-col gap-4 sm:flex-row sm:items-center">
      <nav class="flex items-center gap-4" aria-label="Enlaces sociales">
        @for (enlace of enlaces; track enlace.url) {
          <a
            [href]="enlace.url"
            target="_blank"
            rel="noopener noreferrer"
            class="text-[#A7B0C0] transition hover:text-[#10E0B0] focus:outline-none focus:ring-2 focus:ring-[#10E0B0]/60"
          >
            {{ enlace.nombre }}
          </a>
        }
      </nav>

      <p class="text-xs">
        © {{ anio }}
      </p>
    </div>
  </div>
</footer>
