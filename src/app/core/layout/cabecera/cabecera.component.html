<header class="fixed top-0 z-50 w-full border-b border-white/10 bg-[#020106]/80 backdrop-blur-xl">
  <div class="mx-auto flex h-16 max-w-6xl items-center justify-between px-5 sm:px-6 md:h-28 lg:px-8">
    <a
      href="#inicio"
      class="group relative isolate flex items-center gap-3 overflow-hidden rounded-2xl px-2 py-2 transition md:gap-5 md:px-3"
      aria-label="Ir al inicio de Wester Dev"
      [attr.aria-current]="estaActivo('#inicio') ? 'location' : null"
      (click)="seleccionarEnlace('#inicio')"
    >
      <span
        class="absolute inset-0 -z-10 origin-left scale-x-0 rounded-2xl bg-gradient-to-r from-[#10E0B0]/10 via-[#10A0C0]/10 to-[#8040E0]/14 opacity-0 transition-all duration-300 ease-out group-hover:scale-x-100 group-hover:opacity-100 group-focus-visible:scale-x-100 group-focus-visible:opacity-100"
        [class.scale-x-100]="estaActivo('#inicio')"
        [class.opacity-100]="estaActivo('#inicio')"
      ></span>

      <span
        class="flex h-9 w-9 items-center justify-center overflow-hidden rounded-xl border border-white/10 bg-white/[0.04] md:h-16 md:w-16 md:rounded-2xl"
      >
        <img
          src="/images/logo-wester.webp"
          alt=""
          class="h-8 w-8 object-contain md:h-14 md:w-14"
          loading="eager"
        />
      </span>

      <span class="flex flex-col leading-none">
        <span class="text-sm font-semibold tracking-wide text-white md:text-xl">
          Wester Dev
        </span>
        <span class="mt-1 text-[0.65rem] uppercase tracking-[0.22em] text-[#6E7688] md:mt-2 md:text-xs">
          Guillermo Romero
        </span>
      </span>
    </a>

    <nav class="hidden items-center gap-3 md:flex lg:gap-4" aria-label="Navegación principal">
      @for (enlace of enlaces; track enlace.destino) {
        <a
          [href]="enlace.destino"
          class="group relative isolate overflow-hidden rounded px-4 py-2 text-base font-medium text-[#A7B0C0] transition-colors duration-300 hover:text-white focus-visible:outline-none"
          [class.text-white]="estaActivo(enlace.destino)"
          [attr.aria-current]="estaActivo(enlace.destino) ? 'location' : null"
          (click)="seleccionarEnlace(enlace.destino)"
        >
          <span
            class="absolute inset-0 -z-10 origin-left scale-x-0 rounded-br-xl rounded-tl-xl bg-gradient-to-r from-[#10E0B0]/54 via-[#10A0C0]/32 to-[#8040E0]/38 opacity-0 transition-all duration-300 ease-out group-hover:scale-x-100 group-hover:opacity-100 group-focus-visible:scale-x-100 group-focus-visible:opacity-100"
            [class.scale-x-100]="estaActivo(enlace.destino)"
            [class.opacity-100]="estaActivo(enlace.destino)"
          ></span>

          <span class="relative">
            {{ enlace.texto }}
          </span>
        </a>
      }
    </nav>

    <button
      type="button"
      class="group relative isolate inline-flex h-10 w-10 items-center justify-center overflow-hidden rounded-xl border border-white/10 bg-white/[0.04] text-white transition hover:border-white/10 focus-visible:outline-none md:hidden"
      [attr.aria-label]="textoMenu()"
      [attr.aria-expanded]="menuAbierto()"
      aria-controls="menu-movil"
      (click)="alternarMenu()"
    >
      <span
        class="absolute inset-0 -z-10 origin-left scale-x-0 rounded-xl bg-gradient-to-r from-[#10E0B0]/14 via-[#10A0C0]/12 to-[#8040E0]/18 opacity-0 transition-all duration-300 ease-out group-hover:scale-x-100 group-hover:opacity-100 group-focus-visible:scale-x-100 group-focus-visible:opacity-100"
      ></span>

      <span aria-hidden="true" class="text-xl leading-none">
        @if (menuAbierto()) {
          ×
        } @else {
          ≡
        }
      </span>
    </button>
  </div>

  <div
    id="menu-movil"
    class="overflow-hidden border-t border-white/10 bg-[#020106]/95 transition-all duration-300 ease-out md:hidden"
    [class.max-h-96]="menuAbierto()"
    [class.opacity-100]="menuAbierto()"
    [class.pointer-events-auto]="menuAbierto()"
    [class.max-h-0]="!menuAbierto()"
    [class.opacity-0]="!menuAbierto()"
    [class.pointer-events-none]="!menuAbierto()"
  >
    <nav class="px-5 sm:px-6" aria-label="Navegación móvil">
      <div class="space-y-1 py-4">
        @for (enlace of enlaces; track enlace.destino) {
          <a
            [href]="enlace.destino"
            class="group relative isolate block overflow-hidden rounded-xl px-4 py-3 text-sm font-medium text-[#A7B0C0] transition-colors duration-300 hover:text-white focus-visible:outline-none"
            [class.text-white]="estaActivo(enlace.destino)"
            [attr.aria-current]="estaActivo(enlace.destino) ? 'location' : null"
            (click)="seleccionarEnlace(enlace.destino)"
          >
            <span
              class="absolute inset-0 -z-10 origin-left scale-x-0 rounded-xl bg-gradient-to-r from-[#10E0B0]/14 via-[#10A0C0]/12 to-[#8040E0]/18 opacity-0 transition-all duration-300 ease-out group-hover:scale-x-100 group-hover:opacity-100 group-focus-visible:scale-x-100 group-focus-visible:opacity-100"
              [class.scale-x-100]="estaActivo(enlace.destino)"
              [class.opacity-100]="estaActivo(enlace.destino)"
            ></span>

            <span class="relative">
              {{ enlace.texto }}
            </span>
          </a>
        }
      </div>
    </nav>
  </div>
</header>
